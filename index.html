<!DOCTYPE html>
<html>
<head>
<title>Laptop Comparison</title>

<style>
body{
font-family:Arial;
padding:40px;
}

.compare-box{
border:1px solid #ddd;
padding:20px;
border-radius:12px;
width:320px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.compare-box table{
width:100%;
margin-bottom:10px;
}

.compare-box .our{
font-weight:bold;
color:green;
}
</style>

</head>

<body>
<p id="ai-reason">Loading AI comparison...</p>

<h2>Dell Latitude 7420</h2>

<div class="compare-box">

<h3>Why Buy From Us</h3>

<table>
<tr>
<td>Amazon</td>
<td>₹68,000</td>
</tr>

<tr>
<td>Flipkart</td>
<td>₹64,500</td>
</tr>

<tr class="our">
<td>Our Price</td>
<td>₹59,000</td>
</tr>

</table>

<ul>
<li>Save ₹9,000 vs Amazon</li>
<li>1 Year Warranty</li>
<li>Certified Refurbished</li>
<li>Free Shipping</li>
</ul>

</div>
<script>
async function loadAIReason() {
  try {
    const res = await fetch("/api/test");
    const data = await res.json();

    const text = data.output[0].content[0].text;

    document.getElementById("ai-reason").innerText = text;
  } catch (err) {
    console.error(err);
  }
}

loadAIReason();
</script>
</body>
</html>
