<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laptop Comparison Widget</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .widget {
      max-width: 420px;
      margin: auto;
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
    }

    .prices p, .copy p {
      margin: 8px 0;
    }

    ul {
      padding-left: 18px;
    }

    .save {
      font-weight: bold;
      margin-top: 12px;
    }

    .cta {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 14px;
      background: black;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="widget">
    <h2 id="headline">Loading comparison...</h2>

    <div class="prices">
      <p><strong>Amazon:</strong> <span id="amazon-price">-</span></p>
      <p><strong>Flipkart:</strong> <span id="flipkart-price">-</span></p>
      <p><strong>Our Price:</strong> <span id="our-price">-</span></p>
    </div>

    <div class="copy">
      <p id="price-line"></p>
      <p class="save" id="savings-line"></p>
      <ul id="reasons"></ul>
      <a href="#" class="cta" id="cta">Buy Now</a>
    </div>
  </div>

  <script>
    async function loadComparison() {
      const payload = {
        product_title: "Dell Latitude 7420 Refurbished",
        our_price: 27999,
        amazon_price: 32999,
        flipkart_price: 31499,
        brand_name: "NewJaisa"
      };

      document.getElementById("amazon-price").innerText = "₹" + payload.amazon_price;
      document.getElementById("flipkart-price").innerText = "₹" + payload.flipkart_price;
      document.getElementById("our-price").innerText = "₹" + payload.our_price;

      try {
        const res = await fetch("/api/compare", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          console.error(data);
          document.getElementById("headline").innerText = "Comparison unavailable";
          return;
        }

        document.getElementById("headline").innerText = data.ai.headline;
        document.getElementById("price-line").innerText = data.ai.price_line;
        document.getElementById("savings-line").innerText = data.ai.savings_line;
        document.getElementById("cta").innerText = data.ai.cta;

        const reasonsList = document.getElementById("reasons");
        reasonsList.innerHTML = "";

        (data.ai.reasons || []).forEach((reason) => {
          const li = document.createElement("li");
          li.innerText = reason;
          reasonsList.appendChild(li);
        });
      } catch (error) {
        console.error(error);
        document.getElementById("headline").innerText = "Comparison unavailable";
      }
    }

    loadComparison();
  </script>
</body>
</html>
